name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required files present
        run: |
          set -euo pipefail
          test -f index.html
          test -f style.css
          test -f CNAME
          test -f getting-started.html
      - name: Custom domain pinned
        run: grep -qx "speedforge.dev" CNAME
      - name: Landing content sanity
        run: |
          set -euo pipefail
          grep -q "<title>" index.html
          grep -q 'href="./style.css"' index.html
          grep -q "github.com/apps/speedforge/installations/new" index.html
          grep -q "runs-on: speedforge" index.html
          grep -q "Current data: one win, not a blanket speed claim" index.html
          grep -q "27895683262" index.html
          grep -q "Request early access" index.html
      - name: Getting-started linked + onboarding flow present
        run: |
          set -euo pipefail
          # Landing and status pages must link to the onboarding doc.
          grep -q 'href="/getting-started.html"' index.html
          grep -q 'href="/getting-started.html"' status.html
          # The onboarding doc must describe the auto-migration flow.
          grep -q "github.com/apps/speedforge/installations/new" getting-started.html
          grep -q "runs-on: speedforge" getting-started.html
      - name: Pricing page present + linked (usage-based)
        run: |
          set -euo pipefail
          test -f pricing.html
          # Pricing is customer-facing and must be reachable from the landing nav.
          grep -q 'href="/pricing.html"' index.html
          # The model we sell publicly is usage-based / per runner-minute.
          grep -qi "runner-minute" pricing.html
      - name: No INTERNAL cost model leaks into public copy
        run: |
          set -euo pipefail
          # Speedforge is PAID and publishes customer-facing per-minute pricing
          # (usage-based). What must NEVER appear publicly is our INTERNAL cost
          # model — the shared/flat-capped subscription that backs the fleet and
          # how it's billed to us (#574, feedback-no-publicize-shared-subscription).
          # So we ban the internal-model vocabulary, NOT customer prices.
          if grep -RniE "shared[- ]subscription|flat[- ]cap|tokenomics|shared[- ](quota|cap)|per[- ]seat|seat[- ]based|cost[- ]basis|node[- ]hour" -- *.html; then
            echo "Internal/shared-subscription cost model must not appear in public copy (#574)"; exit 1
          fi

  privacy-denylist:
    name: Privacy denylist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Skip private denylist scan for untrusted fork PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::notice::Private denylist scan skipped for fork PR; it runs on trusted branches and after merge."

      - name: Fetch pinned private denylist
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          PRIVATE_DENYLIST_TOKEN: ${{ secrets.PRIVATE_DENYLIST_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PRIVATE_DENYLIST_TOKEN:-}" ]; then
            echo "PRIVATE_DENYLIST_TOKEN is required for trusted privacy scan"; exit 1
          fi
          curl -fsSL \
            -H "Authorization: Bearer ${PRIVATE_DENYLIST_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/selamy-labs/internal-agent-skills/contents/privacy/denylist.yml?ref=denylist-v1" \
            -o /tmp/privacy-denylist.yml
          test -s /tmp/privacy-denylist.yml

      - name: Scan published content
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          python3 scripts/privacy_scan.py \
            --denylist /tmp/privacy-denylist.yml \
            index.html pricing.html getting-started.html status.html style.css CNAME
